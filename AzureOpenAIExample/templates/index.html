<!DOCTYPE html>
<!--
  index.html
  ----------
  The chat page for the Azure AI Chatbot.

  This file has three parts:
    1. HTML  - the page structure (header, chat area, input box)
    2. CSS   - the styling (dark theme, bubbles, animations)
    3. JS    - the logic (sending messages, receiving streaming replies)

  How the chat works:
    - The user types a message and presses Enter
    - JavaScript sends the full conversation history to /chat on the server
    - The server streams the reply back token by token
    - Each token is decoded and added to the chat bubble in real time
    - marked.js converts markdown in the AI reply to formatted HTML
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Azure AI Chatbot</title>

  <!--
    marked.js - third party library that converts markdown text to HTML
    For example: **bold** becomes <strong>bold</strong>
    Loaded from a CDN so we don't need to install anything extra
    Docs: https://marked.js.org
  -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* reset default browser spacing */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* full height dark background, flex column layout */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header bar ─────────────────────────────────────── */
    header {
      width: 100%;
      padding: 16px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 18px;
      color: #58a6ff;
    }

    /* small badge on the right showing the model name */
    #model-label {
      margin-left: auto;
      font-size: 12px;
      background: #1f6feb33;
      color: #58a6ff;
      border: 1px solid #1f6feb;
      border-radius: 12px;
      padding: 2px 10px;
    }

    /* ── Chat message list ──────────────────────────────── */
    /* scrollable area that holds all the messages */
    #chat-box {
      width: 100%;
      max-width: 800px;
      flex: 1;             /* takes up all remaining vertical space */
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* thin scrollbar so it doesn't look too heavy */
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* one row = avatar + bubble side by side */
    .message {
      display: flex;
      gap: 12px;
    }

    /* round icon showing "U" for user and "AI" for the bot */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;      /* don't let it shrink when text is long */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .user-avatar { background: #1f6feb; color: #fff; }
    .bot-avatar  { background: #238636; color: #fff; }

    /* the speech bubble containing the message text */
    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14.5px;
      max-width: calc(100% - 44px);
      word-break: break-word;
    }

    /* user bubble - blue tint */
    .user .bubble {
      background: #1f6feb22;
      border: 1px solid #1f6feb55;
      white-space: pre-wrap; /* preserve line breaks in user messages */
    }

    /* bot bubble - dark background */
    .bot .bubble {
      background: #161b22;
      border: 1px solid #30363d;
    }

    /* ── Typing animation (three bouncing dots) ─────────── */
    .typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin: 0 2px;
      background: #58a6ff;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    /* stagger the dots so they bounce one after another */
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── Markdown styles inside bot bubbles ─────────────── */
    /* these styles only apply inside .bot .bubble so they don't
       affect the rest of the page */

    .bot .bubble p            { margin-bottom: 10px; }
    .bot .bubble p:last-child { margin-bottom: 0; }

    /* headings */
    .bot .bubble h1, .bot .bubble h2, .bot .bubble h3 {
      margin: 14px 0 6px;
      font-weight: 600;
    }
    .bot .bubble h1 { font-size: 1.2em; }
    .bot .bubble h2 { font-size: 1.1em; }
    .bot .bubble h3 { font-size: 1em; }

    /* bullet and numbered lists */
    .bot .bubble ul, .bot .bubble ol { margin: 6px 0 10px 20px; }
    .bot .bubble li { margin-bottom: 4px; }

    /* text formatting */
    .bot .bubble strong { color: #f0f6fc; }
    .bot .bubble em     { color: #cdd9e5; }
    .bot .bubble a      { color: #58a6ff; }

    /* quoted text */
    .bot .bubble blockquote {
      border-left: 3px solid #30363d;
      margin: 8px 0;
      padding: 4px 12px;
      color: #8b949e;
    }

    /* inline code e.g. `variable` */
    .bot .bubble code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 13px;
      color: #e06c75;
    }

    /* code blocks e.g. ```python ... ``` */
    .bot .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;    /* scroll sideways if code is wide */
      margin: 10px 0;
    }

    /* reset code style inside a pre block */
    .bot .bubble pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: #c9d1d9;
    }

    /* tables */
    .bot .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .bot .bubble th, .bot .bubble td {
      border: 1px solid #30363d;
      padding: 6px 12px;
    }
    .bot .bubble th { background: #161b22; }

    /* ── Input area at the bottom ───────────────────────── */
    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 12px 16px 20px;
    }

    /* the text box and send button sit inside this row */
    #input-row {
      display: flex;
      gap: 8px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 8px 8px 8px 16px;
    }

    /* highlight the border when the user clicks inside */
    #input-row:focus-within { border-color: #58a6ff; }

    /* the text area where user types their message */
    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e1e4e8;
      font-size: 14.5px;
      resize: none;        /* don't show the resize handle */
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #user-input::placeholder { color: #6e7681; }

    /* the green send button */
    #send-btn {
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 16px;
      align-self: flex-end;
    }

    #send-btn:hover    { background: #2ea043; }
    #send-btn:disabled { background: #30363d; cursor: not-allowed; }

    /* clear chat button */
    #clear-btn {
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #8b949e;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
      float: right;
    }

    #clear-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* small text below the input area */
    .hint { font-size: 12px; color: #6e7681; margin-top: 6px; }
  </style>
</head>
<body>

  <!-- ── Top header bar ─────────────────────────────────── -->
  <header>
    <span>🤖</span>
    <h1>Azure AI Chatbot</h1>
    <!-- model name is filled in by JavaScript after page loads -->
    <span id="model-label">Loading...</span>
  </header>

  <!-- ── Chat messages will be added here by JavaScript ── -->
  <div id="chat-box"></div>

  <!-- ── Input area at the bottom ──────────────────────── -->
  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for new line)"></textarea>
      <!-- ▶ symbol as the send button icon -->
      <button id="send-btn">&#9658;</button>
    </div>
    <button id="clear-btn">Clear chat</button>
    <p class="hint">Powered by Azure OpenAI</p>
  </div>

  <script>
    /*
     * JavaScript for the Azure AI Chatbot
     * ------------------------------------
     * This script handles:
     *   - Fetching the model name from the server
     *   - Sending messages to the /chat endpoint
     *   - Receiving the streaming reply and updating the chat bubble
     *   - Rendering markdown in bot replies using marked.js
     */

    // grab references to the HTML elements we need
    var chatBox    = document.getElementById("chat-box");
    var inputBox   = document.getElementById("user-input");
    var sendBtn    = document.getElementById("send-btn");
    var clearBtn   = document.getElementById("clear-btn");
    var modelLabel = document.getElementById("model-label");

    // chatHistory holds all messages sent so far.
    // We send the full history every time so the AI remembers the conversation.
    // Each item looks like: { role: "user", content: "Hello!" }
    var chatHistory = [];

    // isBusy is true while we are waiting for a reply.
    // This stops the user from sending another message at the same time.
    var isBusy = false;

    // configure marked.js:
    //   breaks: true  - treat single line breaks as <br>
    //   gfm: true     - enable GitHub Flavored Markdown (tables, code blocks etc.)
    marked.setOptions({ breaks: true, gfm: true });

    /*
     * When the page loads, ask the server what model is being used
     * and show it in the header badge.
     */
    fetch("/model")
      .then(function(res) { return res.json(); })
      .then(function(data) { modelLabel.textContent = data.deployment || "Unknown"; });

    /*
     * Auto-grow the text box as the user types.
     * We reset the height to "auto" first so it can shrink back down
     * when the user deletes text.
     */
    inputBox.addEventListener("input", function() {
      inputBox.style.height = "auto";
      inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + "px";
    });

    /*
     * Send on Enter key press.
     * Shift+Enter inserts a new line instead of sending.
     */
    inputBox.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // send button click
    sendBtn.addEventListener("click", sendMessage);

    // clear button wipes the chat history and removes all messages from the screen
    clearBtn.addEventListener("click", function() {
      chatHistory = [];
      chatBox.innerHTML = "";
    });

    /*
     * addMessage(role, text)
     * ----------------------
     * Creates a new message row with an avatar and a speech bubble,
     * then appends it to the chat box.
     *
     * @param {string} role  - "user" or "bot"
     * @param {string} text  - the message content
     * @returns {HTMLElement} - the bubble element (so we can update it later during streaming)
     */
    function addMessage(role, text) {
      // outer row that holds the avatar and bubble side by side
      var row = document.createElement("div");
      row.className = "message " + role;

      // round avatar showing "U" for user, "AI" for bot
      var avatar = document.createElement("div");
      avatar.className = "avatar " + (role === "user" ? "user-avatar" : "bot-avatar");
      avatar.textContent = role === "user" ? "U" : "AI";

      // speech bubble with the message text
      var bubble = document.createElement("div");
      bubble.className = "bubble";

      if (role === "user") {
        // use textContent for user messages to prevent any HTML injection
        bubble.textContent = text;
      } else {
        // use innerHTML for bot messages so marked.js can render markdown
        bubble.innerHTML = marked.parse(text || "");
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      chatBox.appendChild(row);

      // scroll to the bottom so the new message is visible
      chatBox.scrollTop = chatBox.scrollHeight;

      return bubble;
    }

    /*
     * showTypingDots()
     * ----------------
     * Adds a temporary row with three animated dots to show the bot is thinking.
     * It is removed as soon as the first token of the reply arrives.
     */
    function showTypingDots() {
      var row = document.createElement("div");
      row.className = "message bot";
      row.id = "typing-row";  // we use this id to find and remove it later

      var avatar = document.createElement("div");
      avatar.className = "avatar bot-avatar";
      avatar.textContent = "AI";

      var bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.innerHTML = "<span></span><span></span><span></span>";

      row.appendChild(avatar);
      row.appendChild(bubble);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    /*
     * removeTypingDots()
     * ------------------
     * Removes the typing indicator row from the chat.
     */
    function removeTypingDots() {
      var el = document.getElementById("typing-row");
      if (el) el.remove();
    }

    /*
     * sendMessage()
     * -------------
     * Main function that runs when the user sends a message.
     *
     * Steps:
     *   1. Read the text from the input box
     *   2. Add the user message to the chat and history
     *   3. POST the full history to /chat on the server
     *   4. Read the streaming response line by line
     *   5. Decode each token and update the bot bubble in real time
     *   6. When done, save the full reply to history
     */
    async function sendMessage() {
      var text = inputBox.value.trim();

      // do nothing if the input is empty or we are already waiting for a reply
      if (!text || isBusy) return;

      isBusy = true;
      sendBtn.disabled = true;
      inputBox.value = "";
      inputBox.style.height = "auto";

      // add the user message to history and show it on screen
      chatHistory.push({ role: "user", content: text });
      addMessage("user", text);
      showTypingDots();

      try {
        // send the full conversation history to the server
        var response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: chatHistory })
        });

        // if the server returned an error status code
        if (!response.ok) {
          var err = await response.json();
          removeTypingDots();
          addMessage("bot", "Error: " + (err.error || "Something went wrong"));
          chatHistory.pop(); // remove the user message we just added
          return;
        }

        // remove the dots and create an empty bot bubble to fill with tokens
        removeTypingDots();
        var botBubble = addMessage("bot", "");
        var fullText = "";

        // buffer holds incomplete SSE lines between read() calls
        var buffer = "";

        // ReadableStream reader - reads the response body chunk by chunk
        var reader = response.body.getReader();
        var decoder = new TextDecoder();

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          // decode the raw bytes to a string and add to our buffer
          buffer += decoder.decode(result.value, { stream: true });

          // split by newline to get individual SSE lines
          var lines = buffer.split("\n");

          // the last item might be an incomplete line, keep it in the buffer
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            // SSE lines that carry data start with "data: "
            if (!line.startsWith("data: ")) continue;

            var payload = line.slice(6); // remove the "data: " prefix

            // [DONE] means the stream has finished
            if (payload === "[DONE]") break;

            try {
              // each token was JSON.stringified on the server so we parse it back
              fullText += JSON.parse(payload);

              // re-render the full text as markdown each time we get a new token
              botBubble.innerHTML = marked.parse(fullText);
              chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
              // skip any chunk that can't be parsed (shouldn't normally happen)
            }
          }
        }

        // save the complete bot reply to history for the next request
        chatHistory.push({ role: "assistant", content: fullText });

      } catch (err) {
        // network or other unexpected error
        removeTypingDots();
        addMessage("bot", "Network error: " + err.message);
        chatHistory.pop();
      }

      // re-enable the input now that we are done
      isBusy = false;
      sendBtn.disabled = false;
      inputBox.focus();
    }
  </script>

</body>
</html>
